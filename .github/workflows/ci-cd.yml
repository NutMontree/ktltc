name: Build and Branch Promotion CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-promote:
    name: Build and Promote to Production
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://localhost:27017/ktltc_db
      AUTH_SECRET: dummy_secret_auth_key_for_building
      NEXTAUTH_SECRET: dummy_secret_auth_key_for_building
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Project
        run: npm run build

      - name: Push to Production Branch
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git push -f origin HEAD:production
